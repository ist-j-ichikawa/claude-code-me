<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Source+Code+Pro:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Claude Code Me</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <script>
      // Hash router: ensure default route before SvelteKit init
      if (!location.hash || location.hash === "#" || location.hash === "#/") {
        history.replaceState(null, "", "/#/scope/user/dashboard");
      }
    </script>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
